services:
  - type: web
    name: hoc-phi-web
    runtime: node
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
    disks:
      - name: hoc-phi-data
        mountPath: /var/data
        sizeGB: 1
